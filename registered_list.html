<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Várakozók Listája | DunakesziFutam 2026</title>
    <link rel="stylesheet" href="drgon.css?v=1.0.5">
    <style>
        body {
            padding: 30px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
        }
        .list-container {
            max-width: 1100px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }
        .stat-count-banner {
            background: rgba(0, 228, 255, 0.08);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
        }
        .stat-icon { font-size: 1.5rem; }
        .stat-text { font-weight: 600; color: var(--text-secondary); }
        .stat-value { font-size: 1.2rem; color: var(--accent-primary); font-family: 'Space Mono', monospace; font-weight: 700; }
        
        .racer-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 80px 2fr 1.5fr 1fr;
            align-items: center;
            transition: all 0.2s;
        }
        .racer-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-primary);
        }
        .bib-badge {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            color: var(--accent-primary);
            font-size: 1.1rem;
        }
        .racer-names { font-weight: 700; color: white; }
        .racer-cat { color: var(--text-secondary); font-size: 0.9rem; }
        .racer-dist { color: var(--accent-secondary); font-weight: 800; font-size: 0.8rem; text-transform: uppercase; }

        @media (max-width: 768px) {
            .racer-card { grid-template-columns: 1fr; gap: 8px; }
            .header-box { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="list-container">
        <div class="header-box">
            <div>
                <h1 class="logo-text-unified">Várakozók névsora</h1>
                <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 5px;">Még el nem rajtolt versenyzők listája</p>
            </div>
            <button class="btn-primary" onclick="loadData()">🔄 Lista Frissítése</button>
        </div>

        <div id="stat-banner" class="stat-count-banner">
            <span class="stat-icon">⏳</span>
            <div>
                <span class="stat-text">Jelenleg várólistán:</span>
                <span id="registered-count" class="stat-value">--</span>
                <span class="stat-text"> egység</span>
            </div>
        </div>

        <div class="table-responsive">
            <table class="results-table">
                <thead>
                    <tr>
                        <th style="width: 100px;">Rajtszám</th>
                        <th>Egység Tagjai</th>
                        <th>Kategória</th>
                        <th style="width: 120px;">Táv</th>
                    </tr>
                </thead>
                <tbody id="registered-list-body">
                    <tr><td colspan="4" style="text-align: center; padding: 50px;">Adatok betöltése...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = (window.location.hostname === 'localhost' || window.location.protocol === 'file:')
            ? 'http://localhost:3001/api'
            : '/api';

        const categoryMap = {
            'kajak_1_nyitott_11km': 'Kajak-1 nyitott',
            'kajak_2_nyitott_11km': 'Kajak-2 nyitott',
            'kenu_nyitott_11km': 'Kenu nyitott',
            'rovid_kenu_11km': 'Rövid kenu',
            'versenykajak_noi_1_22km': 'Versenykajak női-1 (38 cm)',
            'versenykajak_ferfi_1_22km': 'Versenykajak férfi-1 (38 cm)',
            'turakajak_noi_1_22km': 'Túrakajak női-1 (42–51 cm)',
            'turakajak_ferfi_1_22km': 'Túrakajak férfi-1 (42–51 cm)',
            'turakajak_2_nyitott_22km': 'Túrakajak 2 (nyitott)',
            'tengeri_kajak_noi_1_22km': 'Tengeri kajak női-1 (51 cm>)',
            'tengeri_kajak_ferfi_1_22km': 'Tengeri kajak férfi-1 (51 cm>)',
            'mk_1_fiu_22km': 'MK-1 fiú',
            'mk_1_leany_22km': 'MK-1 leány',
            'outrigger_noi_1_22km': 'Outrigger női-1',
            'outrigger_ferfi_1_22km': 'Outrigger férfi-1',
            'outrigger_2_nyitott_22km': 'Outrigger-2 (nyitott)',
            'kenu_2_ferfi_22km': 'Kenu-2 férfi',
            'kenu_2_vegyes_22km': 'Kenu-2 vegyes',
            'kenu_3_nyitott_22km': 'Kenu-3 (nyitott)',
            'kenu_4_nyitott_22km': 'Kenu-4 (nyitott)',
            'sup_noi_1_22km': 'SUP női-1',
            'sup_ferfi_1_22km': 'SUP férfi-1',
            'sarkanyhajo_otproba': 'Sárkányhajó ötpróba'
        };

        function formatCategoryName(id) {
            if (!id) return '-';
            if (id.includes('sarkany')) return '🐉 Sárkányhajó';
            return categoryMap[id] || id.replace(/_/g, ' ');
        }

        async function loadData() {
            try {
                const response = await fetch(`${API_URL}/data`);
                if (!response.ok) throw new Error('Hiba a szerver válaszában');
                const result = await response.json();
                
                const registered = result.racers.filter(r => r.status === 'registered');
                document.getElementById('registered-count').textContent = registered.length;
                
                const tbody = document.getElementById('registered-list-body');
                tbody.innerHTML = '';
                
                if (registered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; padding: 50px; color: var(--text-secondary);">Jelenleg nincs várakozó versenyző. Mindenki elrajtolt! 🚀</td></tr>';
                    return;
                }

                registered.sort((a,b) => (a.bib || 0) - (b.bib || 0)).forEach(r => {
                    const tr = document.createElement('tr');
                    let names = r.name || '-';
                    if (r.members && r.members.length > 0) {
                        const tMem = r.members.find(m => m.otproba_id === 'CSAPATNEV');
                        const rMems = r.members.filter(m => m.otproba_id !== 'CSAPATNEV');
                        if (tMem) {
                            names = rMems.length > 0 ? `<strong>${tMem.name}</strong> <span style="font-size:0.85em; color:var(--text-secondary);">(${rMems.map(m => m.name).join(', ')})</span>` : `<strong>${tMem.name}</strong>`;
                        } else {
                            names = rMems.map(m => m.name).join(', ');
                        }
                    }
                    
                    tr.innerHTML = `
                        <td><strong class="bib-badge">#${(r.bib || 0).toString().padStart(3, '0')}</strong></td>
                        <td><div class="racer-names">${names}</div></td>
                        <td><div class="racer-cat">${formatCategoryName(r.category)}</div></td>
                        <td><div class="racer-dist">${r.distance || '-'}</div></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('registered-list-body').innerHTML = '<tr><td colspan="4" style="text-align:center; color: #ff6b6b; padding: 30px;">Hiba történt az adatok lekérésekor. Ellenőrizze a hálózati kapcsolatot!</td></tr>';
            }
        }

        loadData();
        // Auto refresh
        setInterval(loadData, 5000);
    </script>
</body>
</html>
